<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caleb Chess</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <h1 class="title">Caleb Chess</h1>

    <section id="menu-screen" class="menu-screen" aria-label="Main menu">
      <div class="menu-panel">
        <h2 class="menu-title">Main Menu</h2>
        <p class="menu-tagline">Choose how you want to play before stepping onto the board.</p>

        <div class="menu-group">
          <label class="menu-control" for="menu-mode">Battle Mode</label>
          <select id="menu-mode" aria-label="Select battle mode">
            <option value="human">Two Players (Local)</option>
            <option value="ai-white">Single Player — You Play White</option>
            <option value="ai-black">Single Player — You Play Black</option>
          </select>
        </div>

        <div class="menu-group" id="difficulty-menu-group">
          <span class="menu-control" id="difficulty-label">Difficulty</span>
          <div class="difficulty-grid" role="radiogroup" aria-labelledby="difficulty-label">
            <label class="difficulty-option">
              <input type="radio" name="menu-difficulty" value="easy">
              <span>Easy</span>
            </label>
            <label class="difficulty-option">
              <input type="radio" name="menu-difficulty" value="normal" checked>
              <span>Normal</span>
            </label>
            <label class="difficulty-option">
              <input type="radio" name="menu-difficulty" value="hard">
              <span>Hard</span>
            </label>
            <label class="difficulty-option">
              <input type="radio" name="menu-difficulty" value="pro">
              <span>Pro</span>
            </label>
          </div>
        </div>

        <div class="menu-group theme-group">
          <span class="menu-control">Board &amp; Pieces Theme</span>
          <div class="theme-grid" role="radiogroup" aria-label="Select board and piece theme">
            <label class="theme-option theme-option-wood">
              <input type="radio" name="menu-theme" value="wood" checked>
              <span>Walnut &amp; Ivory</span>
            </label>
            <label class="theme-option theme-option-metal">
              <input type="radio" name="menu-theme" value="metal">
              <span>Forged Steel</span>
            </label>
            <label class="theme-option theme-option-glass">
              <input type="radio" name="menu-theme" value="glass">
              <span>Crystal Glass</span>
            </label>
          </div>
        </div>

        <div class="menu-group toggles-group">
          <span class="menu-control">Audio &amp; Effects</span>
          <div class="menu-toggle-row dual-toggle-row">
            <button type="button" id="sound-toggle" class="menu-toggle-button active" aria-pressed="true">Sound On</button>
            <button type="button" id="animation-toggle" class="menu-toggle-button active" aria-pressed="true">FX On</button>
          </div>
        </div>

        <button id="play-button" type="button" class="play-button">Play</button>
      </div>
    </section>

    <section id="game-screen" class="game-screen hidden" aria-label="Chess game">
      <div class="game-topbar">
        <button id="back-to-menu" type="button" class="ghost-button">Main Menu</button>
        <div class="session-settings">
          <p><strong>Mode:</strong> <span id="active-mode">Two Players (Local)</span></p>
          <p class="session-difficulty"><strong>Difficulty:</strong> <span id="active-difficulty">Normal</span></p>
          <p class="session-theme"><strong>Theme:</strong> <span id="active-theme">Walnut &amp; Ivory</span></p>
        </div>
        <div class="session-controls">
          <label class="inline-select" for="in-game-theme">
            <span>Change Theme</span>
            <select id="in-game-theme" aria-label="Change active board theme">
              <option value="wood">Walnut &amp; Ivory</option>
              <option value="metal">Forged Steel</option>
              <option value="glass">Crystal Glass</option>
            </select>
          </label>
          <label class="inline-toggle sound-toggle">
            <input type="checkbox" id="in-game-sound-toggle" checked>
            <span class="toggle-slider" aria-hidden="true"></span>
            <span class="toggle-label" id="game-sound-status">Sound</span>
          </label>
          <label class="inline-toggle fx-toggle">
            <input type="checkbox" id="in-game-animation-toggle" checked>
            <span class="toggle-slider" aria-hidden="true"></span>
            <span class="toggle-label" id="game-animation-status">FX</span>
          </label>
        </div>
        <button id="new-game" type="button">Restart</button>
      </div>

      <section class="status" aria-live="polite">
        <p id="turn-indicator">White to move</p>
        <p id="game-status">Select Play from the menu to begin.</p>
      </section>
      <section class="board-wrapper">
        <div id="chessboard" class="board" aria-label="Chess board" role="grid"></div>
        <div id="victory-banner" class="victory-banner hidden" role="status" aria-live="assertive">
          <p id="victory-message"></p>
        </div>
      </section>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
